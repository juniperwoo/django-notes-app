<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="card shadow p-4" style="width: 350px; border-radius: 15px;">

    <!-- Title -->
    <h3 class="text-center mb-3">Create Account</h3>
    <p class="text-center text-muted mb-4">Sign up to start saving notes</p>

    <!-- Form -->
    <form method="POST">
        {% csrf_token %}

        <!-- Username -->
        <div class="mb-3">
            <label class="form-label">Username</label>
            <div class="input-group">
                <span class="input-group-text">
                    <i class="bi bi-person"></i>
                </span>
                {{ form.username }}
            </div>
            <div class="text-danger small">{{ form.username.errors }}</div>
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
                <span class="input-group-text">
                    <i class="bi bi-lock"></i>
                </span>
                {{ form.password1 }}
            </div>
            <div class="text-danger small">{{ form.password1.errors }}</div>
        </div>

        <!-- Confirm Password -->
        <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <div class="input-group">
                <span class="input-group-text">
                    <i class="bi bi-lock-fill"></i>
                </span>
                {{ form.password2 }}
            </div>
            <div class="text-danger small">{{ form.password2.errors }}</div>
        </div>

        <!-- Button -->
        <button type="submit" class="btn btn-success w-100">
            Sign Up
        </button>
    </form>

    <!-- Login link -->
    <p class="mt-3 text-center">
        Already have an account?
        <a href="/login/">Login</a>
    </p>

</div>

</body>
</html>
